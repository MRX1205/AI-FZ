server {
    listen 80;                                              # 监听 80 端口（HTTP）
    server_name merchant.lyhlz.cn;                          # 域名

    client_max_body_size 50m;                               # 最大上传文件大小 50MB

    # ========== 前端静态资源 ==========
    # 访问 http://merchant.lyhlz.cn/ 时转发到前端容器
    location / {
        proxy_pass http://127.0.0.1:6140;                   # 转发到前端容器（Nginx → 容器 6140）
        proxy_http_version 1.1;
        proxy_set_header Host $host;                        # 保留原始域名
        proxy_set_header X-Real-IP $remote_addr;            # 客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链 IP
        proxy_set_header X-Forwarded-Proto $scheme;         # 原始协议（http/https）
        proxy_set_header Upgrade $http_upgrade;             # WebSocket 支持
        proxy_set_header Connection "upgrade";
    }

    # ========== 后端 API ==========
    # 访问 http://merchant.lyhlz.cn/api/ 时转发到后端容器
    location /api/ {
        proxy_pass http://127.0.0.1:6141;                   # 转发到后端容器（Nginx → 容器 6141）
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS 跨域头（同域代理时不需要，但保留以防直连后端）
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 预检请求直接返回 204
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ========== 文件上传 ==========
    # 访问 http://merchant.lyhlz.cn/uploads/ 时转发到后端容器
    location /uploads/ {
        proxy_pass http://127.0.0.1:6141;                   # 转发到后端容器
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
