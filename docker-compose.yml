services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fz-postgres
    environment:
      POSTGRES_DB: fz
      POSTGRES_USER: fz_user
      POSTGRES_PASSWORD: fz_password
    ports:
      - "5432:5432"
    volumes:
      - fz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fz_user -d fz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fz-redis
    ports:
      - "6379:6379"
    volumes:
      - fz_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: fz-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fz_minio
      MINIO_ROOT_PASSWORD: fz_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fz_minio_data:/data

volumes:
  fz_postgres_data:
  fz_redis_data:
  fz_minio_data:
